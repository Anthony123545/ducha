# 项目相关配置
supervision:
  # 名称
  name: supervision
  # 版本
  version: 3.8.2
  # 版权年份
  copyrightYear: 2021
  # 实例演示开关
  demoEnabled: true
  # 文件路径 示例（ Windows配置D:/supervision/uploadPath，Linux配置 /home/supervision/uploadPath）
  profile: D:/supervision/uploadPath
  profileaddress: 192
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数组计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8090
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # tomcat最大线程数，默认为200
    max-threads: 800
    # Tomcat启动初始化的线程数，默认值25
    min-spare-threads: 30

# 日志配置
logging:
  level:
    com.supervision: debug
    org.springframework: warn

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size:  600MB
      # 设置总上传的文件大小
      max-request-size:  600MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: false
  # redis 配置
  redis:
    # 地址
    host: 43.138.82.93
    # 端口，默认为6379
    port: 16379
    # 数据库索引
    database: 1
    # 密码
    password: XDUxdu2025
    # 连接超时时间
    timeout: 3000
    lettuce:
      # 连接池中的最小空闲连接
      min-idle: 0
      # 连接池中的最大空闲连接
      max-idle: 8
      # 连接池的最大数据库连接数
      max-active: 8
      # #连接池最大阻塞等待时间（使用负值表示没有限制）
      max-wait: -1ms

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认30分钟）
  expireTime: 800

# MyBatis配置
mybatis:
  mapperLocations: classpath*:/mapper/**/*.xml
  typeAliasesPackage: com.supervision.**.entity,com.supervision.**.domain
  configLocation: classpath:mybatis/mybatis-config.xml
  configuration:
    map-underscore-to-camel-case: true

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Swagger配置
swagger:
  # 是否开启swagger
  enabled: true
  # 请求前缀
  pathMapping: /dev-api

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# api接口token
taishi:
  apiToken: 99a9829f236a4328bf752e262533912c

# 门禁key
iclock:
  key: 2633p84hnnlavzcy9afjcbtj1jdnega0ftscjkka6h7a

# 门禁图片路径
faceImgPath: E:/sourceCode/faceImg

# 车辆抓拍图片路径
carCameraPicPath: E:/sourceCode/Camera/car_pics

# 存储文件配置
uploadDir: E:/sourceCode/faceImg/faces/

# 监控推流nginx # FFmpeg 配置
video:
  enableHlsInit: false # false 表示不启用 ffpmeg 推流 hls
  nginxProxyUrl: "http://localhost:8080/hls/" # 播放地址前缀
  ffmpegPath: C:/Users/11868/Desktop/videos/ffmpeg/bin/ffmpeg.exe # ffmpeg 可执行路径
  filePath: C:/Users/11868/Desktop/videos/file # 存放 m3u8 文件目录
  videoFormat: ".m3u8"

# ZLMediaKit API 地址（控制/管理接口）
zlm:
  host: http://127.0.0.1:800
  httpHost: http://34.131.62.53:800 # ZLM 对外 http 播放地址（flv 使用的端口，通常是 8080）
  secret: zXwAb2XaNWyyWLYsPoZxcbXIpxC6lBIE # 如果 ZLM 配置了 secret（建议启用），填写 secret
  schema: rtmp # schema
  app: live # ZLM 业务 app 名称（默认 live）
  vhost: __defaultVhost__  # vhost
